<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dataset vs Average Waste Generated</title>

<style>

body{
font-family:Segoe UI;
background:#eef2f7;
margin:0;
}

h1{
text-align:center;
margin:30px;
}

/* CARD */

.card{

width:60%;
max-width:600px;

margin:auto;

background:white;

padding:40px;

border-radius:12px;

box-shadow:0 4px 10px rgba(0,0,0,0.2);

text-align:center;

}

/* VALUE */

.value{

font-size:60px;

color:#2c3e50;

margin-top:10px;

}

/* MOBILE */

@media(max-width:768px){

.card{
width:90%;
}

.value{
font-size:40px;
}

}

</style>

</head>

<body>

<h1>Dataset vs Average Waste Generated</h1>

<div class="card">

<p>Global Average Waste</p>

<div id="avg" class="value">Loading...</div>

</div>

<script>

/* FETCH AVERAGE DATA */

fetch("/average")

.then(res => res.json())

.then(data => {

document.getElementById("avg").innerText = Number(data).toFixed(2);

})

.catch(() => {

document.getElementById("avg").innerText = "Backend not running";

});

</script>
</body>
</html>
