<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Year vs Waste Generated (Country Trends)</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:#eef2f7;
margin:0;
}

h1{
text-align:center;
margin:25px;
}

/* CARD */

.card{

width:90%;
max-width:1200px;

margin:auto;

background:white;

padding:30px;

border-radius:12px;

box-shadow:0 4px 10px rgba(0,0,0,0.2);

height:500px;

}

/* CHART */

canvas{
width:100%;
height:100%;
}

.loading{
text-align:center;
margin-top:10px;
color:#64748b;
}

</style>

</head>

<body>

<h1>Year vs Waste Generated (Country Trends)</h1>

<div class="card">

<canvas id="chart"></canvas>

<div id="status" class="loading">Loading data...</div>

</div>

<script>

fetch("/country-trend")

.then(res => res.json())

.then(data => {

/* ✅ HANDLE EMPTY DATA */

if(!data || data.length === 0){
document.getElementById("status").innerText = "No data available";
return;
}

document.getElementById("status").innerText = "";

const datasets = []

const colors = [
"#ef4444",
"#3b82f6",
"#22c55e",
"#f59e0b",
"#8b5cf6"
]

/* SAFE LOOP */

data.slice(0,5).forEach((country,index) => {

if(!country[1]) return;

datasets.push({
label: String(country[0]),
data: country[1].map(x => Number(x[1])),
borderColor: colors[index],
fill:false,
tension:0.3
})

})

/* SAFE LABELS */

const labels = data[0] && data[0][1]
? data[0][1].map(x => Number(x[0]))
: []

new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:labels,
datasets:datasets
},

options:{
responsive:true,
maintainAspectRatio:false,
scales:{
y:{
beginAtZero:true
}
}
}

})

})

.catch((err) => {

/* SHOW REAL ERROR */

console.log(err)
document.getElementById("status").innerText = "Error loading data";

})

</script>
</body>

</html>
