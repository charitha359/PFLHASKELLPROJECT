<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Country vs Waste Generated (Global Map)</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo@4"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

<style>

body{
font-family:Segoe UI;
background:#eef2f7;
margin:0;
}

h1{
text-align:center;
margin:25px;
}

.card{
width:90%;
max-width:1200px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
height:600px;
}

canvas{
width:100%;
height:100%;
}

.loading{
text-align:center;
margin-top:10px;
color:#64748b;
}

</style>

</head>

<body>

<h1>Country vs Waste Generated (Global Map)</h1>

<div class="card">

<canvas id="mapChart"></canvas>

<div id="status" class="loading">Loading map data...</div>

</div>

<script>

/* FETCH DATA FROM BACKEND */
fetch("https://pflhaskellproject-1.onrender.com/data")

.then(res => res.json())

.then(async data => {

document.getElementById("status").innerText = "";

/* LOAD WORLD MAP */
const world = await fetch("https://unpkg.com/world-atlas@2/countries-110m.json")
.then(res => res.json())

const countries = topojson.feature(world, world.objects.countries).features

/* CREATE DATASET */
const dataset = countries.map(d => {

const matches = data.filter(x =>
  x.country && d.properties.name &&
  (
    x.country.toLowerCase() === d.properties.name.toLowerCase() ||
    x.country.toLowerCase().includes(d.properties.name.toLowerCase()) ||
    d.properties.name.toLowerCase().includes(x.country.toLowerCase())
  )
)

/* TAKE LATEST YEAR */
const latest = matches.sort((a,b) => b.year - a.year)[0]

return {
feature: d,
value: latest ? Number(latest.waste) : 0
}

})

/* DRAW MAP */
new Chart(document.getElementById("mapChart"),{

type:"choropleth",

data:{
labels:countries.map(d => d.properties.name),
datasets:[{
label:"Waste Generated",
data:dataset,

/* COLOR SCALE */
backgroundColor: (ctx) => {
  const value = ctx.raw?.value || 0
  return value > 10000 ? "#08306b" :
         value > 5000  ? "#2171b5" :
         value > 2000  ? "#6baed6" :
         value > 1000  ? "#bdd7e7" :
         "#eff3ff"
}
}]
},

options:{
responsive:true,
maintainAspectRatio:false,
scales:{
projection:{
axis:"x",
projection:"equalEarth"
}
}
}

})

})

.catch(() => {
document.getElementById("status").innerText = "Error loading data"
})

</script>

</body>
</html>
