<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Country vs Waste Generated (Global Map)</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo@4"></script>

<style>

body{
font-family:Segoe UI;
background:#eef2f7;
margin:0;
}

h1{
text-align:center;
margin:25px;
}

.card{

width:90%;
max-width:1200px;

margin:auto;

background:white;

padding:30px;

border-radius:12px;

box-shadow:0 4px 10px rgba(0,0,0,0.2);

height:600px;

}

canvas{
width:100%;
height:100%;
}

.loading{
text-align:center;
margin-top:10px;
color:#64748b;
}

</style>

</head>

<body>

<h1>Country vs Waste Generated (Global Map)</h1>

<div class="card">

<canvas id="mapChart"></canvas>

<div id="status" class="loading">Loading map data...</div>

</div>

<script>

/* BACKEND URL */

const backend = "https://bug-free-carnival-pj4qp55w6x7fr6wx-3000.app.github.dev";

/* FETCH MAP DATA */

fetch("/data")

.then(res => res.json())

.then(async data => {

document.getElementById("status").innerText = "";

/* Load world map */

const world = await fetch("/data")
.then(res => res.json())

const countries = ChartGeo.topojson.feature(world, world.objects.countries).features

/* Create map data */

const dataset = countries.map(d => {

const match = data.find(x => x[0] === d.properties.name)

return {
feature: d,
value: match ? match[1] : 0
}

})

/* Draw map */

new Chart(document.getElementById("mapChart"),{

type:"choropleth",

data:{
labels:countries.map(d => d.properties.name),
datasets:[{
label:"Waste Generated",
data:dataset
}]
},

options:{
responsive:true,
maintainAspectRatio:false,
scales:{
projection:{
axis:"x",
projection:"equalEarth"
}
}
}

})

})

.catch(() => {

document.getElementById("status").innerText = "Backend not running"

})

</script>

</body>
</html>
