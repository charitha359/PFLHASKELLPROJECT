<!DOCTYPE html>
<html>
<head>

<title>Year vs Total Waste Generated</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:#eef2f7;
margin:0;
}

h1{
text-align:center;
margin:25px;
}

.card{

width:90%;
max-width:1200px;

margin:auto;

background:white;

padding:30px;

border-radius:12px;

box-shadow:0 4px 10px rgba(0,0,0,0.2);

height:500px;

}

canvas{
width:100%;
height:100%;
}

</style>

</head>

<body>

<h1>Year vs Total Waste Generated</h1>

<div class="card">
<canvas id="chart"></canvas>
</div>

<script>

fetch("https://bug-free-carnival-pj4qp55w6x7fr6wx-3000.app.github.dev/yearly-total")
.then(res=>res.json())
.then(data=>{

const years=data.map(x=>x[0])
const waste=data.map(x=>x[1])

new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:years,
datasets:[{
label:"Total Waste Generated",
data:waste
}]
},

options:{
responsive:true,
maintainAspectRatio:false
}

})

})

</script>

</body>
</html>
