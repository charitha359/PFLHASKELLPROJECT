<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Country vs Waste Generated (Top Countries)</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:#eef2f7;
margin:0;
}

h1{
text-align:center;
margin:25px;
}

.card{

width:90%;
max-width:1200px;

margin:auto;

background:white;

padding:30px;

border-radius:12px;

box-shadow:0 4px 10px rgba(0,0,0,0.2);

height:500px;

}

canvas{
width:100%;
height:100%;
}

.loading{
text-align:center;
margin-top:10px;
color:#64748b;
}

</style>

</head>

<body>

<h1>Country vs Waste Generated (Top Countries)</h1>

<div class="card">

<canvas id="chart"></canvas>

<div id="status" class="loading">Loading data...</div>

</div>

<script>

/* BACKEND URL */

const backend = "https://bug-free-carnival-pj4qp55w6x7fr6wx-3000.app.github.dev";

/* FETCH DATA */

fetch(backend + "/top-countries")

.then(res => res.json())

.then(data => {

document.getElementById("status").innerText = "";

const countries = data.map(x => x[0])
const waste = data.map(x => x[1])

new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:countries,
datasets:[{
label:"Waste Generated",
data:waste,
backgroundColor:"#ef4444"
}]
},

options:{
responsive:true,
maintainAspectRatio:false
}

})

})

.catch(() => {

document.getElementById("status").innerText = "Backend not running";

})

</script>

</body>

</html>
